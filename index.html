<!doctype html>
<html lang="az">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Biznes statistikası imtahanı</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fa;
      --panel: #ffffff;
      --text: #172033;
      --muted: #657084;
      --line: #d9e0ea;
      --accent: #1d6f9f;
      --accent-strong: #11506f;
      --good: #176f42;
      --good-bg: #e8f7ef;
      --bad: #b42318;
      --bad-bg: #fff0ed;
      --ai: #8a5a00;
      --ai-bg: #fff6df;
      --shadow: 0 12px 30px rgba(18, 29, 46, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      font-family: Calibri, Arial, sans-serif;
      background: var(--bg); color: var(--text); letter-spacing: 0;
    }
    button, select, input { font: inherit; }
    .app { min-height: 100vh; display: grid; grid-template-rows: auto 1fr; }
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px; padding: 14px 22px; background: #ffffff;
      border-bottom: 1px solid var(--line); position: sticky; top: 0; z-index: 10;
    }
    .brand { min-width: 220px; }
    .brand h1 { margin: 0; font-size: 20px; line-height: 1.15; font-weight: 700; }
    .brand span { display: block; margin-top: 2px; color: var(--muted); font-size: 13px; }
    .top-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .layout {
      display: grid; grid-template-columns: 280px minmax(0, 1fr);
      gap: 18px; width: min(1180px, calc(100% - 32px)); margin: 18px auto 28px;
    }
    .side, .main { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; box-shadow: var(--shadow); }
    .side { align-self: start; padding: 16px; position: sticky; top: 80px; }
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .stat { border: 1px solid var(--line); border-radius: 6px; padding: 10px; background: #fbfcfe; min-height: 64px; }
    .stat b { display: block; font-size: 22px; line-height: 1; margin-bottom: 5px; }
    .stat span { color: var(--muted); font-size: 12px; }
    .field { display: grid; gap: 6px; margin-top: 12px; }
    label { font-size: 12px; font-weight: 700; color: #344054; }
    select, input[type="search"] {
      width: 100%; min-height: 38px; border: 1px solid var(--line);
      border-radius: 6px; padding: 7px 10px; background: #ffffff; color: var(--text);
    }
    .toggle-row {
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      margin-top: 12px; padding: 10px; border: 1px solid var(--line); border-radius: 6px; background: #fbfcfe;
    }
    .toggle-row span { font-size: 13px; color: #344054; font-weight: 700; }
    .toggle-row input { width: 18px; height: 18px; accent-color: var(--accent); }
    .main { min-height: 640px; display: grid; grid-template-rows: auto 1fr auto; overflow: hidden; }
    .question-head {
      padding: 18px 20px; border-bottom: 1px solid var(--line);
      display: flex; justify-content: space-between; gap: 12px; align-items: center;
    }
    .pill {
      display: inline-flex; align-items: center; min-height: 28px; padding: 4px 9px;
      border: 1px solid var(--line); border-radius: 999px; color: #344054;
      background: #fbfcfe; font-size: 13px; white-space: nowrap;
    }
    .question-body { padding: 24px 24px 18px; display: grid; align-content: start; gap: 18px; }
    .topic { color: var(--accent-strong); font-weight: 700; font-size: 13px; line-height: 1.3; }
    .question { font-size: 24px; line-height: 1.28; font-weight: 700; margin: 0; max-width: 900px; }
    .options { display: grid; gap: 10px; max-width: 900px; }
    .option {
      width: 100%; min-height: 58px; display: grid; grid-template-columns: 38px 1fr;
      gap: 12px; align-items: center; text-align: left; border: 1px solid var(--line);
      border-radius: 8px; background: #ffffff; padding: 10px 12px; color: var(--text);
      cursor: pointer; transition: border-color 0.12s ease, background 0.12s ease, transform 0.12s ease;
    }
    .option:not(:disabled):hover { border-color: var(--accent); background: #f5fbff; transform: translateY(-1px); }
    .option:disabled { cursor: default; }
    .option .label {
      width: 34px; height: 34px; display: inline-grid; place-items: center;
      border-radius: 50%; border: 1px solid var(--line); font-weight: 700; background: #f8fafc;
    }
    .option .text { min-width: 0; overflow-wrap: anywhere; line-height: 1.3; }
    .option.correct { border-color: rgba(23, 111, 66, 0.55); background: var(--good-bg); }
    .option.correct .label { border-color: var(--good); color: #ffffff; background: var(--good); }
    .option.wrong { border-color: rgba(180, 35, 24, 0.5); background: var(--bad-bg); }
    .option.wrong .label { border-color: var(--bad); color: #ffffff; background: var(--bad); }
    .feedback { display: none; max-width: 900px; border-radius: 8px; padding: 12px 14px; border: 1px solid var(--line); line-height: 1.35; }
    .feedback.show { display: block; }
    .feedback.good { color: var(--good); background: var(--good-bg); border-color: rgba(23, 111, 66, 0.28); }
    .feedback.bad { color: var(--bad); background: var(--bad-bg); border-color: rgba(180, 35, 24, 0.28); }
    .source { color: var(--muted); font-size: 12px; margin-top: 6px; }
    .ai-tools { max-width: 900px; }
    .ai-btn { background: var(--ai-bg); border-color: #f0c674; color: var(--ai); }
    .ai-btn:hover { border-color: #d99a00; background: #fff1cf; }
    .ai-box { display: none; max-width: 900px; border: 1px solid var(--line); border-radius: 8px; background: #fffdf6; overflow: hidden; }
    .ai-box.show { display: block; }
    .ai-box .ai-h { padding: 10px 14px; background: var(--ai-bg); border-bottom: 1px solid var(--line); font-weight: 700; color: var(--ai); font-size: 14px; display: flex; align-items: center; gap: 8px; }
    .ai-box .ai-b { padding: 12px 14px; line-height: 1.45; white-space: pre-wrap; font-size: 15px; }
    .ai-box .ai-b h4 { margin: 10px 0 4px; color: var(--accent-strong); font-size: 14px; }
    .spinner { display: inline-block; width: 15px; height: 15px; border: 2px solid rgba(138,90,0,.25); border-top-color: var(--ai); border-radius: 50%; animation: spin .7s linear infinite; vertical-align: -2px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .bottom-bar {
      display: flex; justify-content: space-between; align-items: center; gap: 12px;
      padding: 14px 20px; border-top: 1px solid var(--line); background: #fbfcfe;
    }
    .nav-group { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn {
      min-height: 38px; border: 1px solid var(--line); border-radius: 6px;
      background: #ffffff; color: var(--text); padding: 7px 12px; cursor: pointer; font-weight: 700;
    }
    .btn:hover { border-color: var(--accent); }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: #ffffff; }
    .btn.primary:hover { background: var(--accent-strong); border-color: var(--accent-strong); }
    .btn:disabled { opacity: 0.45; cursor: default; }
    .progress { min-width: 150px; height: 10px; border-radius: 999px; overflow: hidden; background: #e9eef5; }
    .progress div { height: 100%; width: 0%; background: var(--accent); transition: width 0.18s ease; }
    .empty { padding: 32px; color: var(--muted); }
    @media (max-width: 860px) {
      .topbar { align-items: flex-start; flex-direction: column; padding: 12px 14px; }
      .top-actions { width: 100%; justify-content: flex-start; }
      .layout { grid-template-columns: 1fr; width: calc(100% - 20px); margin-top: 10px; }
      .side { position: static; }
      .main { min-height: 580px; }
      .question-head, .bottom-bar { align-items: flex-start; flex-direction: column; }
      .question-body { padding: 18px 16px; }
      .question { font-size: 20px; }
      .option { grid-template-columns: 34px 1fr; min-height: 54px; }
      .progress { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <h1>Biznes statistikası imtahanı</h1>
        <span id="questionTotal">310 sual</span>
      </div>
      <div class="top-actions">
        <button class="btn" id="restartBtn" type="button">Yenidən başla</button>
        <button class="btn" id="fullModeBtn" type="button">Tam baza</button>
        <button class="btn" id="practiceBtn" type="button">25 sual sınaq</button>
        <button class="btn" id="revealBtn" type="button">Cavabları göstər</button>
        <button class="btn primary" id="shuffleBtn" type="button">Qarışdır</button>
      </div>
    </header>

    <div class="layout">
      <aside class="side">
        <div class="stat-grid">
          <div class="stat"><b id="answeredStat">0</b><span>Cavablandı</span></div>
          <div class="stat"><b id="correctStat">0</b><span>Düzgün</span></div>
          <div class="stat"><b id="wrongStat">0</b><span>Səhv</span></div>
          <div class="stat"><b id="scoreStat">0%</b><span>Nəticə</span></div>
        </div>
        <div class="field">
          <label for="topicFilter">Mövzu</label>
          <select id="topicFilter"></select>
        </div>
        <div class="field">
          <label for="searchBox">Axtarış</label>
          <input id="searchBox" type="search" autocomplete="off" placeholder="Sual və ya cavab axtar...">
        </div>
        <label class="toggle-row">
          <span>Yalnız səhvlər</span>
          <input id="wrongOnly" type="checkbox">
        </label>
      </aside>

      <main class="main">
        <div class="question-head">
          <div class="nav-group">
            <span class="pill" id="positionPill">Sual 1 / 310</span>
            <span class="pill" id="modePill">Tam baza</span>
          </div>
          <div class="progress" aria-hidden="true"><div id="progressBar"></div></div>
        </div>
        <section class="question-body" id="questionArea"></section>
        <div class="bottom-bar">
          <div class="nav-group">
            <button class="btn" id="prevBtn" type="button">Əvvəlki</button>
            <button class="btn primary" id="nextBtn" type="button">Növbəti</button>
          </div>
          <span class="pill" id="sourcePill"></span>
        </div>
      </main>
    </div>
  </div>

  <script type="application/json" id="quiz-data">{"topics": ["Statistik məlumatların təhlil edilməsi və ümumiləşdirilməsi", "İndekslər və sosial-iqtisadi tədqiqatlarda onlardan istifadə", "Sosial-iqtisadi hadisə və proseslər arasındakı qarşılıqlı əlaqələr", "Biznes statistikasında seçmə müşahidəsi", "İqtisadi göstəricilərin proqnozlaşdırılmasının statistik metodları", "Biznes statistikasında variasiya göstəriciləri", "Sosial-iqtisadi hadisələrin dinamikasının öyrənilməsi", "Statistika göstəriciləri sistemi. Nisbi kəmiyyətlər", "Statistika göstəriciləri sistemi. Mütləq kəmiyyətlər", "Məlumatların yekunlaşdırılması, qruplaşdırılması. Cədvəl və qrafiklər", "Statistik müşahidə. Azərbaycan Respublikasında hesabatın təşkili", "Azərbaycan Respublikasında statistika işlərinin təşkili", "Biznes statistikasının predmeti və onun metodu", "Orta kəmiyyətlər və onların növləri"], "questions": [{"id": 1, "number": 1, "topic": "Statistik məlumatların təhlil edilməsi və ümumiləşdirilməsi", "question": "Hansı faktorlar statistika vǝ seçmǝ müşahidǝ metodlarının tǝtbiqini vǝ tǝhlilini müǝyyǝn edir?", "options": [{"text": "tədqiqatın məqsədi, məcmu vahidlərinin xüsusiyyətləri, məlumatların həcmi və dəqiqlik tələbləri", "correct": true}, {"text": "yalnız müşahidə aparılan ərazinin böyüklüyü", "correct": false}, {"text": "yalnız hesablamalarda istifadə olunan cədvəllərin sayı", "correct": false}, {"text": "yalnız respondentlərin peşəsi", "correct": false}, {"text": "yalnız məlumatların çap olunma forması", "correct": false}], "correctText": "tədqiqatın məqsədi, məcmu vahidlərinin xüsusiyyətləri, məlumatların həcmi və dəqiqlik tələbləri"}, {"id": 2, "number": 2, "topic": "Statistik məlumatların təhlil edilməsi və ümumiləşdirilməsi", "question": "Axenvaldın dövründǝ statistik mǝlumatlar necǝ qǝbul edilirdi?", "options": [{"text": "dövlətlərin siyasi vəziyyətinin və diqqətəlayiq yerlərinin təsviri kimi", "correct": true}, {"text": "yalnız müəssisələrin maliyyə hesabatı kimi", "correct": false}, {"text": "riyazi ehtimal nəzəriyyəsinin ayrıca bölməsi kimi", "correct": false}, {"text": "əhalinin yalnız təbii hərəkətinin uçotu kimi", "correct": false}, {"text": "istehsal xərclərinin mühasibat uçotu kimi", "correct": false}], "correctText": "dövlətlərin siyasi vəziyyətinin və diqqətəlayiq yerlərinin təsviri kimi"}, {"id": 3, "number": 3, "topic": "Statistik məlumatların təhlil edilməsi və ümumiləşdirilməsi", "question": "Seçmǝ müşahidǝ üsulunun uğurlu tǝtbiqi üçün nǝlǝr tǝlǝb olunur?", "options": [{"text": "seçilmiş vahidlərin reprezentativliyi, kifayət qədər həcm və düzgün müşahidə proqramı", "correct": true}, {"text": "yalnız sualların çoxsaylı olması", "correct": false}, {"text": "yalnız müşahidənin bir dəfə aparılması", "correct": false}, {"text": "yalnız məlumatların qrafiklərlə verilməsi", "correct": false}, {"text": "yalnız müşahidəçilərin sayının çoxluğu", "correct": false}], "correctText": "seçilmiş vahidlərin reprezentativliyi, kifayət qədər həcm və düzgün müşahidə proqramı"}, {"id": 4, "number": 4, "topic": "Statistik məlumatların təhlil edilməsi və ümumiləşdirilməsi", "question": "Seçmǝ müşahidǝ aparılarkǝn hansı şǝrtlǝr vacib hesab olunur?", "options": [{"text": "seçmə məcmusunun baş məcmunu düzgün təmsil etməsi və vahidlərin obyektiv qaydada seçilməsi", "correct": true}, {"text": "yalnız müşahidə blankının iri həcmli olması", "correct": false}, {"text": "yalnız bütün vahidlərin başdan-başa qeydə alınması", "correct": false}, {"text": "yalnız nəticələrin mətn formasında verilməsi", "correct": false}, {"text": "yalnız seçilən vahidlərin eyni ərazidə yerləşməsi", "correct": false}], "correctText": "seçmə məcmusunun baş məcmunu düzgün təmsil etməsi və vahidlərin obyektiv qaydada seçilməsi"}, {"id": 5, "number": 5, "topic": "Statistik məlumatların təhlil edilməsi və ümumiləşdirilməsi", "question": "Seçmǝ müşahidǝ üsulu necǝ müǝyyǝnlǝşdirilir?", "options": [{"text": "baş məcmunun müəyyən hissəsinin öyrənilməsi əsasında bütün məcmu haqqında nəticə çı alse}, {"text": "Statistik göstəricidir", "correct": false}, {"text": "Məcmunun dinamikası göstəricisidir", "correct": false}], "correctText": "Statistik məcmunun öyrənilən vahidlərinin xüsusiyyətidir"}, {"id": 310, "number": 310, "topic": "Biznes statistikasının predmeti və onun metodu", "question": "Kütləvilik, keyfiyyət bircinsliyi, müəyyən tamlıq, ayrı-ayrı vahidlərin vəziyyətlərinin qarşılıqlı asılılığı və variasiyanın mövcudluğu xüsusiyyətlərinə malik olan elementlər şoxluğu necə adlanır?", "options": [{"text": "Statistika məcmusu", "correct": true}, {"text": "Məlumatlar coxluğu", "correct": false}, {"text": "Statistika göstəriciləri sistemi", "correct": false}, {"text": "Qruplaşdırma", "correct": false}, {"text": "Müşahidə obyekti", "correct": false}], "correctText": "Statistika məcmusu"}]}</script>
  <script>
    const GROQ_KEY = "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";
    const GROQ_MODEL = "llama-3.3-70b-versatile";
    const LETTERS = ['A', 'B', 'C', 'D', 'E'];

    const payload = JSON.parse(document.getElementById('quiz-data').textContent);
    const aiCache = new Map();   // id -> {state:'loading'|'done'|'error', text}

    function shuffleArr(a) {
      a = a.slice();
      for (let i = a.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }
    // assign shuffled, labelled options to each question
    function prepare(list) {
      return list.map(q => {
        const opts = shuffleArr(q.options).map((o, i) => ({ text: o.text, correct: o.correct, label: LETTERS[i] }));
        return Object.assign({}, q, { options: opts });
      });
    }

    let activeQuestions = prepare(payload.questions);
    let questions = activeQuestions.slice();
    let currentIndex = 0;
    let mode = 'all';
    let revealAll = false;
    const answers = new Map();

    const els = {
      questionTotal: document.getElementById('questionTotal'),
      answeredStat: document.getElementById('answeredStat'),
      correctStat: document.getElementById('correctStat'),
      wrongStat: document.getElementById('wrongStat'),
      scoreStat: document.getElementById('scoreStat'),
      topicFilter: document.getElementById('topicFilter'),
      searchBox: document.getElementById('searchBox'),
      wrongOnly: document.getElementById('wrongOnly'),
      questionArea: document.getElementById('questionArea'),
      positionPill: document.getElementById('positionPill'),
      modePill: document.getElementById('modePill'),
      progressBar: document.getElementById('progressBar'),
      sourcePill: document.getElementById('sourcePill'),
      prevBtn: document.getElementById('prevBtn'),
      nextBtn: document.getElementById('nextBtn'),
      restartBtn: document.getElementById('restartBtn'),
      fullModeBtn: document.getElementById('fullModeBtn'),
      practiceBtn: document.getElementById('practiceBtn'),
      shuffleBtn: document.getElementById('shuffleBtn'),
      revealBtn: document.getElementById('revealBtn'),
    };

    function fillTopics() {
      const topics = ['Bütün mövzular', ...payload.topics];
      els.topicFilter.innerHTML = topics.map((topic, index) =>
        `<option value="${index === 0 ? '' : escapeHtml(topic)}">${escapeHtml(topic)}</option>`
      ).join('');
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;',
      }[char]));
    }

    function mdToHtml(s) {
      let t = escapeHtml(s);
      t = t.replace(/\*\*(.+?)\*\*/g, '<b>$1</b>');
      t = t.replace(/^#{1,4}\s*(.+)$/gm, '<h4>$1</h4>');
      return t;
    }

    function applyFilters() {
      const topic = els.topicFilter.value;
      const query = els.searchBox.value.trim().toLocaleLowerCase('az');
      const wrongOnly = els.wrongOnly.checked;

      questions = activeQuestions.filter(question => {
        const state = answers.get(question.id);
        const topicOk = !topic || question.topic === topic;
        const queryOk = !query ||
          question.question.toLocaleLowerCase('az').includes(query) ||
          question.options.some(option => option.text.toLocaleLowerCase('az').includes(query));
        const wrongOk = !wrongOnly || (state && state.correct === false);
        return topicOk && queryOk && wrongOk;
      });
      currentIndex = Math.min(currentIndex, Math.max(questions.length - 1, 0));
      render();
    }

    function clearFilters() {
      els.topicFilter.value = '';
      els.searchBox.value = '';
      els.wrongOnly.checked = false;
    }

    function updateModeLabels() {
      const label = mode === 'practice25' ? '25 sual sınaq' : 'Tam baza';
      els.modePill.textContent = label;
      els.questionTotal.textContent = mode === 'practice25'
        ? `${activeQuestions.length} sual sınaq / ${payload.questions.length} baza`
        : `${payload.questions.length} sual`;
      els.practiceBtn.textContent = mode === 'practice25' ? 'Yeni 25 sual' : '25 sual sınaq';
      els.fullModeBtn.disabled = mode === 'all';
    }

    function startFullMode() {
      mode = 'all';
      activeQuestions = prepare(payload.questions);
      answers.clear();
      currentIndex = 0;
      clearFilters();
      updateModeLabels();
      applyFilters();
    }

    function startPractice25() {
      mode = 'practice25';
      activeQuestions = prepare(shuffleArr(payload.questions).slice(0, 25));
      answers.clear();
      currentIndex = 0;
      clearFilters();
      updateModeLabels();
      applyFilters();
    }

    function render() {
      updateStats();
      if (!questions.length) {
        els.questionArea.innerHTML = '<div class="empty">Uyğun sual tapılmadı.</div>';
        els.positionPill.textContent = 'Sual 0 / 0';
        els.progressBar.style.width = '0%';
        els.sourcePill.textContent = '';
        els.prevBtn.disabled = true;
        els.nextBtn.disabled = true;
        return;
      }

      const question = questions[currentIndex];
      const state = answers.get(question.id);
      const selectedText = state ? state.selectedText : null;
      const progress = ((currentIndex + 1) / questions.length) * 100;

      els.positionPill.textContent = `Sual ${currentIndex + 1} / ${questions.length}`;
      els.progressBar.style.width = `${progress}%`;
      els.sourcePill.textContent = `Mənbə: Word sualı № ${question.number}`;
      els.prevBtn.disabled = currentIndex === 0;
      els.nextBtn.disabled = currentIndex >= questions.length - 1;

      const feedbackClass = state ? (state.correct ? 'good' : 'bad') : (revealAll ? 'good' : '');
      const feedbackText = state
        ? state.correct
          ? 'Düzdür.'
          : `Səhvdir. Düzgün cavab: ${escapeHtml(question.correctText)}`
        : (revealAll ? `Düzgün cavab: ${escapeHtml(question.correctText)}` : '');
      const showFeedback = !!state || revealAll;

      const ai = aiCache.get(question.id);
      let aiInner = '';
      if (ai) {
        if (ai.state === 'loading') aiInner = '<span class="spinner"></span> AI düşünür...';
        else if (ai.state === 'error') aiInner = 'AI cavabı alınmadı.\n' + escapeHtml(ai.text);
        else aiInner = mdToHtml(ai.text);
      }

      els.questionArea.innerHTML = `
        <div class="topic">${escapeHtml(question.topic)}</div>
        <h2 class="question">${escapeHtml(question.question)}</h2>
        <div class="options">
          ${question.options.map(option => {
            const isSelected = selectedText === option.text;
            const className = (state || revealAll)
              ? option.correct ? 'option correct' : isSelected ? 'option wrong' : 'option'
              : 'option';
            return `<button type="button" class="${className}" data-text="${escapeHtml(option.text)}" ${(state || revealAll) ? 'disabled' : ''}>
              <span class="label">${option.label}</span>
              <span class="text">${escapeHtml(option.text)}</span>
            </button>`;
          }).join('')}
        </div>
        <div class="feedback ${showFeedback ? 'show ' + feedbackClass : ''}">
          <strong>${feedbackText}</strong>
        </div>
        <div class="ai-tools">
          <button type="button" class="btn ai-btn" id="learnBtn">💡 AI ilə asan öyrən</button>
        </div>
        <div class="ai-box ${ai ? 'show' : ''}" id="aiBox">
          ${ai ? `<div class="ai-h">💡 Asan öyrənmə üsulu</div><div class="ai-b">${aiInner}</div>` : ''}
        </div>
      `;

      els.questionArea.querySelectorAll('.option').forEach(button => {
        button.addEventListener('click', () => {
          if (answers.get(question.id)) return;
          const selected = question.options.find(option => option.text === button.dataset.text);
          answers.set(question.id, { selectedText: selected.text, correct: selected.correct });
          render();
        });
      });

      const learnBtn = document.getElementById('learnBtn');
      if (learnBtn) learnBtn.addEventListener('click', () => doLearn(question));
    }

    async function doLearn(question) {
      const existing = aiCache.get(question.id);
      if (existing && existing.state === 'done') {
        const box = document.getElementById('aiBox');
        box.classList.toggle('show');
        return;
      }
      if (existing && existing.state === 'loading') return;
      aiCache.set(question.id, { state: 'loading', text: '' });
      render();

      const sys = "Sən Azərbaycan dilində dərs deyən, imtahana hazırlaşan tələbələrə kömək edən təcrübəli müəllimsən. Tələbəyə sualın düzgün cavabını ƏN ASAN yolla yadda saxlamağı öyrət. Qısa, aydın, praktiki ol. Açar sözlər, assosiasiya, məntiqi bağlantı və kiçik bir yaddaş fəndi (mnemonika) ver. Cavab formatı: \"Açar fikir:\", \"Yadda saxlama fəndi:\", \"Sual-cavab bağlantısı:\". Maksimum 150 söz.";
      const usr = `Sual: ${question.question}\nDüzgün cavab: ${question.correctText}\n\nBu sualı və düzgün cavabı necə asan yadda saxlaya bilərəm?`;

      try {
        const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
          method: "POST",
          headers: { "Content-Type": "application/json", "Authorization": "Bearer " + GROQ_KEY },
          body: JSON.stringify({
            model: GROQ_MODEL, temperature: 0.5, max_tokens: 500,
            messages: [{ role: "system", content: sys }, { role: "user", content: usr }]
          })
        });
        if (!res.ok) throw new Error("API " + res.status + ": " + (await res.text()).slice(0, 180));
        const j = await res.json();
        const txt = (j.choices && j.choices[0] && j.choices[0].message.content) || "Cavab alınmadı.";
        aiCache.set(question.id, { state: 'done', text: txt });
      } catch (e) {
        aiCache.set(question.id, { state: 'error', text: e.message });
      }
      render();
    }

    function updateStats() {
      let correct = 0, wrong = 0;
      answers.forEach(answer => { if (answer.correct) correct += 1; else wrong += 1; });
      const answered = correct + wrong;
      const score = answered ? Math.round((correct / answered) * 100) : 0;
      els.answeredStat.textContent = answered;
      els.correctStat.textContent = correct;
      els.wrongStat.textContent = wrong;
      els.scoreStat.textContent = `${score}%`;
    }

    function shuffleQuestions() {
      activeQuestions = prepare(shuffleArr(activeQuestions));
      currentIndex = 0;
      applyFilters();
    }

    els.prevBtn.addEventListener('click', () => { currentIndex = Math.max(0, currentIndex - 1); render(); });
    els.nextBtn.addEventListener('click', () => { currentIndex = Math.min(questions.length - 1, currentIndex + 1); render(); });
    els.restartBtn.addEventListener('click', () => { answers.clear(); aiCache.clear(); currentIndex = 0; clearFilters(); applyFilters(); });
    els.fullModeBtn.addEventListener('click', startFullMode);
    els.practiceBtn.addEventListener('click', startPractice25);
    els.shuffleBtn.addEventListener('click', shuffleQuestions);
    els.revealBtn.addEventListener('click', () => {
      revealAll = !revealAll;
      els.revealBtn.textContent = revealAll ? 'Cavabları gizlət' : 'Cavabları göstər';
      els.revealBtn.classList.toggle('primary', revealAll);
      render();
    });
    els.topicFilter.addEventListener('change', () => { currentIndex = 0; applyFilters(); });
    els.searchBox.addEventListener('input', () => { currentIndex = 0; applyFilters(); });
    els.wrongOnly.addEventListener('change', () => { currentIndex = 0; applyFilters(); });

    fillTopics();
    updateModeLabels();
    render();
  </script>
</body>
</html>
