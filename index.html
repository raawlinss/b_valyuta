<!doctype html>
<html lang="az">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Beynəlxalq valyuta imtahanı</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fa;
      --panel: #ffffff;
      --text: #172033;
      --muted: #657084;
      --line: #d9e0ea;
      --accent: #1d6f9f;
      --accent-strong: #11506f;
      --good: #176f42;
      --good-bg: #e8f7ef;
      --bad: #b42318;
      --bad-bg: #fff0ed;
      --warn: #8a5a00;
      --warn-bg: #fff6df;
      --shadow: 0 12px 30px rgba(18, 29, 46, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Calibri, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      letter-spacing: 0;
    }
    button, select, input {
      font: inherit;
    }
    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 22px;
      background: #ffffff;
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .brand {
      min-width: 220px;
    }
    .brand h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.15;
      font-weight: 700;
    }
    .brand span {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 13px;
    }
    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .layout {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      gap: 18px;
      width: min(1180px, calc(100% - 32px));
      margin: 18px auto 28px;
    }
    .side, .main {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }
    .side {
      align-self: start;
      padding: 16px;
      position: sticky;
      top: 80px;
    }
    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }
    .stat {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px;
      background: #fbfcfe;
      min-height: 64px;
    }
    .stat b {
      display: block;
      font-size: 22px;
      line-height: 1;
      margin-bottom: 5px;
    }
    .stat span {
      color: var(--muted);
      font-size: 12px;
    }
    .field {
      display: grid;
      gap: 6px;
      margin-top: 12px;
    }
    label {
      font-size: 12px;
      font-weight: 700;
      color: #344054;
    }
    select, input[type="search"] {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 7px 10px;
      background: #ffffff;
      color: var(--text);
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 12px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fbfcfe;
    }
    .toggle-row span {
      font-size: 13px;
      color: #344054;
      font-weight: 700;
    }
    .toggle-row input {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
    }
    .main {
      min-height: 640px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
    }
    .question-head {
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 4px 9px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: #344054;
      background: #fbfcfe;
      font-size: 13px;
      white-space: nowrap;
    }
    .question-body {
      padding: 24px 24px 18px;
      display: grid;
      align-content: start;
      gap: 18px;
    }
    .topic {
      color: var(--accent-strong);
      font-weight: 700;
      font-size: 13px;
      line-height: 1.3;
    }
    .question {
      font-size: 24px;
      line-height: 1.28;
      font-weight: 700;
      margin: 0;
      max-width: 900px;
    }
    .options {
      display: grid;
      gap: 10px;
      max-width: 900px;
    }
    .option {
      width: 100%;
      min-height: 58px;
      display: grid;
      grid-template-columns: 38px 1fr;
      gap: 12px;
      align-items: center;
      text-align: left;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      padding: 10px 12px;
      color: var(--text);
      cursor: pointer;
      transition: border-color 0.12s ease, background 0.12s ease, transform 0.12s ease;
    }
    .option:not(:disabled):hover {
      border-color: var(--accent);
      background: #f5fbff;
      transform: translateY(-1px);
    }
    .option:disabled {
      cursor: default;
    }
    .option .label {
      width: 34px;
      height: 34px;
      display: inline-grid;
      place-items: center;
      border-radius: 50%;
      border: 1px solid var(--line);
      font-weight: 700;
      background: #f8fafc;
    }
    .option .text {
      min-width: 0;
      overflow-wrap: anywhere;
      line-height: 1.3;
    }
    .option.correct {
      border-color: rgba(23, 111, 66, 0.55);
      background: var(--good-bg);
    }
    .option.correct .label {
      border-color: var(--good);
      color: #ffffff;
      background: var(--good);
    }
    .option.wrong {
      border-color: rgba(180, 35, 24, 0.5);
      background: var(--bad-bg);
    }
    .option.wrong .label {
      border-color: var(--bad);
      color: #ffffff;
      background: var(--bad);
    }
    .feedback {
      display: none;
      max-width: 900px;
      border-radius: 8px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      line-height: 1.35;
    }
    .feedback.show {
      display: block;
    }
    .feedback.good {
      color: var(--good);
      background: var(--good-bg);
      border-color: rgba(23, 111, 66, 0.28);
    }
    .feedback.bad {
      color: var(--bad);
      background: var(--bad-bg);
      border-color: rgba(180, 35, 24, 0.28);
    }
    .source {
      color: var(--muted);
      font-size: 12px;
      margin-top: 6px;
    }
    .bottom-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      border-top: 1px solid var(--line);
      background: #fbfcfe;
    }
    .nav-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .btn {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #ffffff;
      color: var(--text);
      padding: 7px 12px;
      cursor: pointer;
      font-weight: 700;
    }
    .btn:hover {
      border-color: var(--accent);
    }
    .btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #ffffff;
    }
    .btn.primary:hover {
      background: var(--accent-strong);
      border-color: var(--accent-strong);
    }
    .btn:disabled {
      opacity: 0.45;
      cursor: default;
    }
    .progress {
      min-width: 150px;
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      background: #e9eef5;
    }
    .progress div {
      height: 100%;
      width: 0%;
      background: var(--accent);
      transition: width 0.18s ease;
    }
    .empty {
      padding: 32px;
      color: var(--muted);
    }
    @media (max-width: 860px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
        padding: 12px 14px;
      }
      .top-actions {
        width: 100%;
        justify-content: flex-start;
      }
      .layout {
        grid-template-columns: 1fr;
        width: calc(100% - 20px);
        margin-top: 10px;
      }
      .side {
        position: static;
      }
      .main {
        min-height: 580px;
      }
      .question-head, .bottom-bar {
        align-items: flex-start;
        flex-direction: column;
      }
      .question-body {
        padding: 18px 16px;
      }
      .question {
        font-size: 20px;
      }
      .option {
        grid-template-columns: 34px 1fr;
        min-height: 54px;
      }
      .progress {
        width: 100%;
      }
    }
  </style>
</head>

  <script>
    const payload = JSON.parse(document.getElementById('quiz-data').textContent);
    const allQuestions = payload.questions;
    let activeQuestions = [...allQuestions];
    let questions = [...activeQuestions];
    let currentIndex = 0;
    let mode = 'all';
    const answers = new Map();

    const els = {
      questionTotal: document.getElementById('questionTotal'),
      answeredStat: document.getElementById('answeredStat'),
      correctStat: document.getElementById('correctStat'),
      wrongStat: document.getElementById('wrongStat'),
      scoreStat: document.getElementById('scoreStat'),
      topicFilter: document.getElementById('topicFilter'),
      searchBox: document.getElementById('searchBox'),
      wrongOnly: document.getElementById('wrongOnly'),
      questionArea: document.getElementById('questionArea'),
      positionPill: document.getElementById('positionPill'),
      modePill: document.getElementById('modePill'),
      progressBar: document.getElementById('progressBar'),
      sourcePill: document.getElementById('sourcePill'),
      prevBtn: document.getElementById('prevBtn'),
      nextBtn: document.getElementById('nextBtn'),
      restartBtn: document.getElementById('restartBtn'),
      fullModeBtn: document.getElementById('fullModeBtn'),
      practiceBtn: document.getElementById('practiceBtn'),
      shuffleBtn: document.getElementById('shuffleBtn'),
    };

    function fillTopics() {
      const topics = ['Bütün mövzular', ...payload.topics];
      els.topicFilter.innerHTML = topics.map((topic, index) =>
        `<option value="${index === 0 ? '' : escapeHtml(topic)}">${escapeHtml(topic)}</option>`
      ).join('');
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;',
      }[char]));
    }

    function applyFilters() {
      const topic = els.topicFilter.value;
      const query = els.searchBox.value.trim().toLocaleLowerCase('az');
      const wrongOnly = els.wrongOnly.checked;

      questions = activeQuestions.filter(question => {
        const state = answers.get(question.id);
        const topicOk = !topic || question.topic === topic;
        const queryOk = !query ||
          question.question.toLocaleLowerCase('az').includes(query) ||
          question.options.some(option => option.text.toLocaleLowerCase('az').includes(query));
        const wrongOk = !wrongOnly || (state && state.correct === false);
        return topicOk && queryOk && wrongOk;
      });
      currentIndex = Math.min(currentIndex, Math.max(questions.length - 1, 0));
      render();
    }

    function clearFilters() {
      els.topicFilter.value = '';
      els.searchBox.value = '';
      els.wrongOnly.checked = false;
    }

    function updateModeLabels() {
      const label = mode === 'practice25' ? '25 sual sınaq' : 'Tam baza';
      els.modePill.textContent = label;
      els.questionTotal.textContent = mode === 'practice25'
        ? `${activeQuestions.length} sual sınaq / ${allQuestions.length} baza`
        : `${allQuestions.length} sual`;
      els.practiceBtn.textContent = mode === 'practice25' ? 'Yeni 25 sual' : '25 sual sınaq';
      els.fullModeBtn.disabled = mode === 'all';
    }

    function sampleQuestions(count) {
      const pool = [...allQuestions];
      for (let i = pool.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [pool[i], pool[j]] = [pool[j], pool[i]];
      }
      return pool.slice(0, Math.min(count, pool.length));
    }

    function startFullMode() {
      mode = 'all';
      activeQuestions = [...allQuestions];
      answers.clear();
      currentIndex = 0;
      clearFilters();
      updateModeLabels();
      applyFilters();
    }

    function startPractice25() {
      mode = 'practice25';
      activeQuestions = sampleQuestions(25);
      answers.clear();
      currentIndex = 0;
      clearFilters();
      updateModeLabels();
      applyFilters();
    }

    function render() {
      updateStats();
      if (!questions.length) {
        els.questionArea.innerHTML = '<div class="empty">Uyğun sual tapılmadı.</div>';
        els.positionPill.textContent = 'Sual 0 / 0';
        els.progressBar.style.width = '0%';
        els.sourcePill.textContent = '';
        els.prevBtn.disabled = true;
        els.nextBtn.disabled = true;
        return;
      }

      const question = questions[currentIndex];
      const state = answers.get(question.id);
      const selectedText = state ? state.selectedText : null;
      const progress = ((currentIndex + 1) / questions.length) * 100;

      els.positionPill.textContent = `Sual ${currentIndex + 1} / ${questions.length}`;
      els.progressBar.style.width = `${progress}%`;
      els.sourcePill.textContent = `Mənbə: ${question.source.file} #${question.source.number}`;
      els.prevBtn.disabled = currentIndex === 0;
      els.nextBtn.disabled = currentIndex >= questions.length - 1;

      const feedbackClass = state ? (state.correct ? 'good' : 'bad') : '';
      const feedbackText = state
        ? state.correct
          ? 'Düzdür.'
          : `Səhvdir. Düzgün cavab: ${escapeHtml(question.correctText)}`
        : '';

      els.questionArea.innerHTML = `
        <div class="topic">${escapeHtml(question.topic)}</div>
        <h2 class="question">${escapeHtml(question.question)}</h2>
        <div class="options">
          ${question.options.map(option => {
            const isSelected = selectedText === option.text;
            const className = state
              ? option.correct
                ? 'option correct'
                : isSelected
                  ? 'option wrong'
                  : 'option'
              : 'option';
            return `<button type="button" class="${className}" data-testid="option-${option.label}" data-text="${escapeHtml(option.text)}" ${state ? 'disabled' : ''}>
              <span class="label">${option.label}</span>
              <span class="text">${escapeHtml(option.text)}</span>
            </button>`;
          }).join('')}
        </div>
        <div class="feedback ${state ? 'show ' + feedbackClass : ''}">
          <strong>${feedbackText}</strong>
          ${state ? `<div class="source">Mənbə sual uyğunluğu: ${question.source.matchType}, oxşarlıq ${question.source.similarity}</div>` : ''}
        </div>
      `;

      els.questionArea.querySelectorAll('.option').forEach(button => {
        button.addEventListener('click', () => {
          const selected = question.options.find(option => option.text === button.dataset.text);
          answers.set(question.id, { selectedText: selected.text, correct: selected.correct });
          render();
        });
      });
    }

    function updateStats() {
      let correct = 0;
      let wrong = 0;
      answers.forEach(answer => {
        if (answer.correct) correct += 1;
        else wrong += 1;
      });
      const answered = correct + wrong;
      const score = answered ? Math.round((correct / answered) * 100) : 0;
      els.answeredStat.textContent = answered;
      els.correctStat.textContent = correct;
      els.wrongStat.textContent = wrong;
      els.scoreStat.textContent = `${score}%`;
    }

    function shuffleQuestions() {
      const shuffled = [...activeQuestions];
      for (let i = shuffled.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      activeQuestions = shuffled;
      currentIndex = 0;
      applyFilters();
    }

    els.prevBtn.addEventListener('click', () => {
      currentIndex = Math.max(0, currentIndex - 1);
      render();
    });
    els.nextBtn.addEventListener('click', () => {
      currentIndex = Math.min(questions.length - 1, currentIndex + 1);
      render();
    });
    els.restartBtn.addEventListener('click', () => {
      answers.clear();
      currentIndex = 0;
      clearFilters();
      applyFilters();
    });
    els.fullModeBtn.addEventListener('click', startFullMode);
    els.practiceBtn.addEventListener('click', startPractice25);
    els.shuffleBtn.addEventListener('click', shuffleQuestions);
    els.topicFilter.addEventListener('change', () => {
      currentIndex = 0;
      applyFilters();
    });
    els.searchBox.addEventListener('input', () => {
      currentIndex = 0;
      applyFilters();
    });
    els.wrongOnly.addEventListener('change', () => {
      currentIndex = 0;
      applyFilters();
    });

    fillTopics();
    updateModeLabels();
    render();
  </script>
</body>
</html>
